<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Multiplayer Penguin Chat</title>
    <style>
        body {
            margin: 0;
            overflow: hidden;
            font-family: Arial, sans-serif;
            background-color: #87CEEB;
        }
        #canvas-container {
            width: 100vw;
            height: 100vh;
            display: block;
        }
        #ui-container {
            position: absolute;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(255, 255, 255, 0.95);
            padding: 15px;
            border-radius: 10px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.3);
            width: 400px;
            display: flex;
            flex-direction: column;
            gap: 10px;
            border: 3px solid #333;
            z-index: 20;
        }
        .stroke-text {
            color: white;
            -webkit-text-stroke: 1.5px black;
            text-shadow: 1px 1px 0 #000, -1px -1px 0 #000, 1px -1px 0 #000, -1px 1px 0 #000;
            font-weight: bold;
        }
        #chat-log {
            height: 100px;
            overflow-y: auto;
            border: 2px solid #333;
            padding: 5px;
            background: #fff;
            font-size: 14px;
            border-radius: 4px;
        }
        .chat-input-row {
            display: flex;
            gap: 5px;
        }
        input {
            padding: 8px;
            border: 2px solid #333;
            border-radius: 4px;
            font-family: Arial, sans-serif;
            font-weight: bold;
        }
        #username-input { width: 80px; }
        #message-input { flex-grow: 1; }
        button {
            padding: 8px 15px;
            background-color: #007bff;
            color: white;
            border: 2px solid #0056b3;
            border-radius: 5px;
            cursor: pointer;
            font-weight: bold;
        }
        button:hover { background-color: #0056b3; }
        
        /* Dynamic Bubble Style */
        .speech-bubble {
            position: absolute;
            background: white;
            border: 3px solid black;
            border-radius: 10px;
            padding: 8px 12px;
            font-family: Arial, sans-serif;
            font-weight: bold;
            font-size: 14px;
            pointer-events: none;
            transform: translate(-50%, -100%);
            white-space: nowrap;
            box-shadow: 3px 3px 0px rgba(0,0,0,0.2);
            z-index: 10;
        }
        .speech-bubble::after {
            content: '';
            position: absolute;
            bottom: -12px;
            left: 50%;
            transform: translateX(-50%);
            border-width: 12px 12px 0;
            border-style: solid;
            border-color: black transparent transparent transparent;
            display: block;
            width: 0;
        }
        .speech-bubble::before {
            content: '';
            position: absolute;
            bottom: -8px;
            left: 50%;
            transform: translateX(-50%);
            border-width: 9px 9px 0;
            border-style: solid;
            border-color: white transparent transparent transparent;
            display: block;
            width: 0;
            z-index: 1;
        }
    </style>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="/socket.io/socket.io.js"></script>
</head>
<body>

    <div id="canvas-container"></div>
    <div id="bubbles-container"></div>

    <div id="ui-container">
        <h3 class="stroke-text" style="margin: 0; text-align: center; font-size: 22px; letter-spacing: 1px;">Global Chat</h3>
        <div id="chat-log"></div>
        <div class="chat-input-row">
            <input type="text" id="username-input" placeholder="Name" value="Player" maxlength="10">
            <input type="text" id="message-input" placeholder="Type a message..." maxlength="50">
            <button id="send-btn">Send</button>
        </div>
    </div>

    <script>
        const socket = io();
        const otherPlayers = {}; 
        const speechBubbles = {}; 

        const container = document.getElementById('canvas-container');
        const bubblesContainer = document.getElementById('bubbles-container');
        
        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0x87CEEB); 

        const camera = new THREE.PerspectiveCamera(45, window.innerWidth / window.innerHeight, 0.1, 1000);
        camera.position.set(0, 15, 25);
        camera.lookAt(0, 0, 0);

        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        container.appendChild(renderer.domElement);

        const ambientLight = new THREE.AmbientLight(0xffffff, 0.8);
        scene.add(ambientLight);
        const dirLight = new THREE.DirectionalLight(0xffffff, 0.5);
        dirLight.position.set(5, 15, 5);
        scene.add(dirLight);

        const groundGeo = new THREE.PlaneGeometry(100, 100);
        const groundMat = new THREE.MeshBasicMaterial({ color: 0xffffff }); 
        const ground = new THREE.Mesh(groundGeo, groundMat);
        ground.rotation.x = -Math.PI / 2;
        scene.add(ground);

        // Creates a penguin mesh
        function createPenguin() {
            const penguinGroup = new THREE.Group();
            
            const bodyMat = new THREE.MeshBasicMaterial({ color: 0x222222 });
            const bellyMat = new THREE.MeshBasicMaterial({ color: 0xffffff });
            const beakMat = new THREE.MeshBasicMaterial({ color: 0xffaa00 });

            const bodyGeo = new THREE.CylinderGeometry(0.8, 1, 1.8, 16);
            const body = new THREE.Mesh(bodyGeo, bodyMat);
            body.position.y = 1.2;
            penguinGroup.add(body);

            const bellyGeo = new THREE.CylinderGeometry(0.6, 0.75, 1.4, 16);
            const belly = new THREE.Mesh(bellyGeo, bellyMat);
            belly.position.set(0, 1.2, 0.3);
            belly.scale.set(1, 1, 0.5); 
            penguinGroup.add(belly);

            const headGeo = new THREE.SphereGeometry(0.8, 16, 16);
            const head = new THREE.Mesh(headGeo, bodyMat);
            head.position.y = 2.4;
            penguinGroup.add(head);

            const beakGeo = new THREE.ConeGeometry(0.25, 0.6, 16);
            const beak = new THREE.Mesh(beakGeo, beakMat);
            beak.rotation.x = Math.PI / 2;
            beak.position.set(0, 2.4, 0.8);
            penguinGroup.add(beak);

            const flipperGeo = new THREE.BoxGeometry(0.2, 1, 0.4);
            const leftFlipper = new THREE.Mesh(flipperGeo, bodyMat);
            leftFlipper.position.set(-1.0, 1.4, 0);
            leftFlipper.rotation.z = Math.PI / 6;
            penguinGroup.add(leftFlipper);

            const rightFlipper = new THREE.Mesh(flipperGeo, bodyMat);
            rightFlipper.position.set(1.0, 1.4, 0);
            rightFlipper.rotation.z = -Math.PI / 6;
            penguinGroup.add(rightFlipper);

            const footGeo = new THREE.BoxGeometry(0.4, 0.15, 0.7);
            const leftFoot = new THREE.Mesh(footGeo, beakMat);
            leftFoot.position.set(-0.4, 0.1, 0.3);
            penguinGroup.add(leftFoot);

            const rightFoot = new THREE.Mesh(footGeo, beakMat);
            rightFoot.position.set(0.4, 0.1, 0.3);
            penguinGroup.add(rightFoot);

            scene.add(penguinGroup);
            return penguinGroup;
        }

        const myPenguin = createPenguin();

        // Socket logic for networking
        socket.on('currentPlayers', (players) => {
            Object.keys(players).forEach((id) => {
                if (id === socket.id) return; 
                const p = createPenguin();
                p.position.set(players[id].x, 0, players[id].z);
                otherPlayers[id] = p;
            });
        });

        socket.on('newPlayer', (data) => {
            const p = createPenguin();
            p.position.set(data.playerInfo.x, 0, data.playerInfo.z);
            otherPlayers[data.id] = p;
        });

        socket.on('playerMoved', (data) => {
            if (otherPlayers[data.id]) {
                otherPlayers[data.id].position.set(data.x, 0, data.z);
                otherPlayers[data.id].rotation.y = data.yRot;
                const time = Date.now() * 0.015;
                otherPlayers[data.id].rotation.z = Math.sin(time) * 0.15;
            }
        });

        socket.on('playerDisconnected', (id) => {
            if (otherPlayers[id]) {
                scene.remove(otherPlayers[id]);
                delete otherPlayers[id];
            }
        });

        const raycaster = new THREE.Raycaster();
        const mouse = new THREE.Vector2();
        let targetPosition = new THREE.Vector3(0, 0, 0);
        let isMoving = false;

        window.addEventListener('pointerdown', (event) => {
            if (event.target.closest('#ui-container')) return;

            mouse.x = (event.clientX / window.innerWidth) * 2 - 1;
            mouse.y = -(event.clientY / window.innerHeight) * 2 + 1;

            raycaster.setFromCamera(mouse, camera);
            const intersects = raycaster.intersectObject(ground);

            if (intersects.length > 0) {
                targetPosition.copy(intersects[0].point);
                targetPosition.y = 0; 
                isMoving = true;
            }
        });

        const chatLog = document.getElementById('chat-log');
        const usernameInput = document.getElementById('username-input');
        const messageInput = document.getElementById('message-input');
        const sendBtn = document.getElementById('send-btn');

        function sendServerMessage() {
            const user = usernameInput.value.trim() || 'Penguin';
            const msg = messageInput.value.trim();
            if (!msg) return;

            socket.emit('chatMessage', { username: user, msg: msg });
            messageInput.value = '';
        }

        sendBtn.addEventListener('click', sendServerMessage);
        messageInput.addEventListener('keypress', (e) => {
            if (e.key === 'Enter') sendServerMessage();
        });

        socket.on('newChatMessage', (data) => {
            const msgDiv = document.createElement('div');
            msgDiv.style.marginBottom = "4px";
            msgDiv.innerHTML = `<strong>${data.username}:</strong> ${data.msg}`;
            chatLog.appendChild(msgDiv);
            chatLog.scrollTop = chatLog.scrollHeight; 

            spawnSpeechBubble(data.id, data.msg);
        });

        function spawnSpeechBubble(id, text) {
            if (speechBubbles[id]) {
                speechBubbles[id].element.remove();
                clearTimeout(speechBubbles[id].timer);
            }

            const bubble = document.createElement('div');
            bubble.className = 'speech-bubble';
            bubble.innerText = text;
            bubblesContainer.appendChild(bubble);

            speechBubbles[id] = {
                element: bubble,
                timer: setTimeout(() => {
                    bubble.remove();
                    delete speechBubbles[id];
                }, 4000)
            };
        }

        const clock = new THREE.Clock();
        const speed = 7.0; 

        function animate() {
            requestAnimationFrame(animate);
            const delta = clock.getDelta();

            if (isMoving) {
                const distance = myPenguin.position.distanceTo(targetPosition);
                if (distance > 0.1) {
                    const targetAngle = Math.atan2(
                        targetPosition.x - myPenguin.position.x, 
                        targetPosition.z - myPenguin.position.z
                    );
                    myPenguin.rotation.y = targetAngle;

                    const direction = new THREE.Vector3().subVectors(targetPosition, myPenguin.position).normalize();
                    myPenguin.position.add(direction.multiplyScalar(speed * delta));

                    const time = Date.now() * 0.015;
                    myPenguin.rotation.z = Math.sin(time) * 0.15;

                    socket.emit('playerMovement', {
                        x: myPenguin.position.x,
                        z: myPenguin.position.z,
                        yRot: myPenguin.rotation.y
                    });

                } else {
                    isMoving = false;
                    myPenguin.rotation.z = 0; 
                }
            } else {
                socket.emit('playerMovement', { x: myPenguin.position.x, z: myPenguin.position.z, yRot: myPenguin.rotation.y });
            }

            Object.keys(speechBubbles).forEach(id => {
                let targetPenguin = (id === socket.id) ? myPenguin : otherPlayers[id];
                
                if (targetPenguin) {
                    const headPos = targetPenguin.position.clone();
                    headPos.y += 3.5; 
                    headPos.project(camera);

                    const x = (headPos.x * .5 + .5) * window.innerWidth;
                    const y = (headPos.y * -.5 + .5) * window.innerHeight;

                    speechBubbles[id].element.style.left = `${x}px`;
                    speechBubbles[id].element.style.top = `${y}px`;
                }
            });

            renderer.render(scene, camera);
        }

        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });

        animate();
    </script>
</body>
</html>
