<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Game - Club Penguin World</title>
    
    <style>
        body {
            margin: 0;
            overflow: hidden;
            font-family: Arial, Helvetica, sans-serif;
            background-color: #E0F7FA;
            background-image: url('data:image/svg+xml;utf8,<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 600"><rect width="1000" height="600" fill="%23E0F7FA"/><ellipse cx="500" cy="350" rx="350" ry="120" fill="%23B2EBF2" stroke="%2380DEEA" stroke-width="6"/><path d="M-100,-100 Q200,200 500,-100 Z" fill="white"/><path d="M1100,-100 Q800,250 400,-100 Z" fill="white"/><g transform="translate(800, 150)"><circle cx="0" cy="0" r="100" fill="%23FFFFFF"/><path d="M-100,0 A100,100 0 0,1 100,0 Z" fill="%23E0F7FA"/><rect x="-30" y="-10" width="60" height="40" rx="20" fill="%2337474F"/></g><g transform="translate(150, 100) scale(0.7)"><circle cx="0" cy="0" r="100" fill="%23FFFFFF"/><path d="M-100,0 A100,100 0 0,1 100,0 Z" fill="%23E0F7FA"/><rect x="-30" y="-10" width="60" height="40" rx="20" fill="%2337474F"/></g></svg>');
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
        }

        #canvas-container {
            width: 100vw;
            height: 100vh;
            display: block;
            position: absolute;
            top: 0;
            left: 0;
            z-index: 1;
        }
        
        #bubbles-container {
            position: absolute;
            top: 0; left: 0;
            width: 100%; height: 100%;
            pointer-events: none;
            z-index: 5;
        }

        #ui-container {
            position: absolute;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            background: linear-gradient(180deg, rgba(255, 255, 255, 0.95) 0%, rgba(220, 240, 255, 0.95) 100%);
            padding: 15px;
            border-radius: 15px;
            box-shadow: 0 8px 15px rgba(0,0,0,0.3);
            width: 450px;
            display: flex;
            flex-direction: column;
            gap: 12px;
            border: 4px solid #003366;
            z-index: 20;
        }

        .double-stroke-text {
            color: #FFFFFF;
            font-size: 32px;
            font-weight: 900;
            letter-spacing: 2px;
            margin: 0;
            text-align: center;
            text-transform: uppercase;
            text-shadow: 
                -2px -2px 0 #000, 2px -2px 0 #000, -2px 2px 0 #000, 2px 2px 0 #000,
                -2px 0 0 #000, 2px 0 0 #000, 0 -2px 0 #000, 0 2px 0 #000,
                -4px -4px 0 #0056b3, 4px -4px 0 #0056b3, -4px 4px 0 #0056b3, 4px 4px 0 #0056b3,
                -4px 0 0 #0056b3, 4px 0 0 #0056b3, 0 -4px 0 #0056b3, 0 4px 0 #0056b3,
                0px 6px 0px rgba(0,0,0,0.3);
        }

        #chat-log {
            height: 120px;
            overflow-y: auto;
            border: 3px solid #003366;
            padding: 8px;
            background: #fff;
            font-size: 15px;
            font-weight: bold;
            border-radius: 8px;
            box-shadow: inset 0 3px 6px rgba(0,0,0,0.1);
        }
        
        .chat-input-row {
            display: flex;
            gap: 8px;
        }
        
        input {
            padding: 10px;
            border: 3px solid #003366;
            border-radius: 8px;
            font-family: Arial, sans-serif;
            font-weight: bold;
            font-size: 16px;
            outline: none;
        }
        input:focus { border-color: #00BFFF; }
        
        #username-input { width: 90px; }
        #message-input { flex-grow: 1; }
        
        button {
            padding: 10px 20px;
            background: linear-gradient(180deg, #00BFFF 0%, #0056b3 100%);
            color: white;
            border: 3px solid #003366;
            border-radius: 8px;
            cursor: pointer;
            font-family: Arial, sans-serif;
            font-weight: 900;
            font-size: 18px;
            letter-spacing: 1px;
            -webkit-text-stroke: 1px black;
            box-shadow: 0 4px 0 #003366;
            transition: transform 0.1s, box-shadow 0.1s;
        }
        button:active {
            transform: translateY(4px);
            box-shadow: 0 0 0 #003366;
        }
        
        .speech-bubble {
            position: absolute;
            background: linear-gradient(180deg, #ffffff 0%, #f0f0f0 100%);
            border: 3px solid black;
            border-radius: 15px;
            padding: 10px 15px;
            font-family: Arial, sans-serif;
            font-weight: bold;
            font-size: 15px;
            pointer-events: none;
            transform: translate(-50%, -100%);
            white-space: nowrap;
            box-shadow: 4px 4px 0px rgba(0,0,0,0.2);
            z-index: 10;
        }
        .speech-bubble::after {
            content: '';
            position: absolute;
            bottom: -12px;
            left: 50%;
            transform: translateX(-50%);
            border-width: 12px 12px 0;
            border-style: solid;
            border-color: black transparent transparent transparent;
            display: block;
            width: 0;
        }
        .speech-bubble::before {
            content: '';
            position: absolute;
            bottom: -8px;
            left: 50%;
            transform: translateX(-50%);
            border-width: 9px 9px 0;
            border-style: solid;
            border-color: #f0f0f0 transparent transparent transparent;
            display: block;
            width: 0;
            z-index: 1;
        }
    </style>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <!-- Fix: Import socket.io-client via CDN since it is not served from the root as a local file -->
    <script src="https://cdn.socket.io/4.7.5/socket.io.min.js"></script>
</head>
<body>

    <div id="canvas-container"></div>
    <div id="bubbles-container"></div>

    <div id="ui-container">
        <h3 class="double-stroke-text">Blizzard</h3>
        <div id="chat-log"></div>
        <div class="chat-input-row">
            <input type="text" id="username-input" placeholder="Name" value="Penguin" maxlength="10">
            <input type="text" id="message-input" placeholder="Type a message..." maxlength="50">
            <button id="send-btn">SEND</button>
        </div>
    </div>

    <script>
        const socket = io();
        const otherPlayers = {}; 
        const speechBubbles = {}; 

        const container = document.getElementById('canvas-container');
        const bubblesContainer = document.getElementById('bubbles-container');
        
        const scene = new THREE.Scene();

        const camera = new THREE.PerspectiveCamera(40, window.innerWidth / window.innerHeight, 0.1, 1000);
        camera.position.set(0, 20, 30);
        camera.lookAt(0, 0, 0);

        const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.setClearColor(0x000000, 0); 
        renderer.shadowMap.enabled = true;
        renderer.shadowMap.type = THREE.PCFSoftShadowMap;
        container.appendChild(renderer.domElement);

        const ambientLight = new THREE.AmbientLight(0xffffff, 0.7);
        scene.add(ambientLight);
        
        const dirLight = new THREE.DirectionalLight(0xffffff, 0.6);
        dirLight.position.set(10, 20, 10);
        dirLight.castShadow = true;
        dirLight.shadow.camera.left = -25;
        dirLight.shadow.camera.right = 25;
        dirLight.shadow.camera.top = 25;
        dirLight.shadow.camera.bottom = -25;
        dirLight.shadow.mapSize.width = 1024;
        dirLight.shadow.mapSize.height = 1024;
        scene.add(dirLight);

        const groundGeo = new THREE.PlaneGeometry(150, 150);
        const groundMat = new THREE.ShadowMaterial({ opacity: 0.3 }); 
        const ground = new THREE.Mesh(groundGeo, groundMat);
        ground.rotation.x = -Math.PI / 2;
        ground.receiveShadow = true; 
        scene.add(ground);

        function createPenguin() {
            const penguinGroup = new THREE.Group();
            
            const bodyMat = new THREE.MeshStandardMaterial({ color: 0x222222 });
            const bellyMat = new THREE.MeshStandardMaterial({ color: 0xffffff });
            const beakMat = new THREE.MeshStandardMaterial({ color: 0xffaa00 });

            const bodyGeo = new THREE.CylinderGeometry(0.8, 1, 1.8, 16);
            const body = new THREE.Mesh(bodyGeo, bodyMat);
            body.position.y = 1.2;
            body.castShadow = true;
            penguinGroup.add(body);

            const bellyGeo = new THREE.CylinderGeometry(0.6, 0.75, 1.4, 16);
            const belly = new THREE.Mesh(bellyGeo, bellyMat);
            belly.position.set(0, 1.2, 0.3);
            belly.scale.set(1, 1, 0.5); 
            belly.castShadow = true;
            penguinGroup.add(belly);

            const headGeo = new THREE.SphereGeometry(0.8, 16, 16);
            const head = new THREE.Mesh(headGeo, bodyMat);
            head.position.y = 2.4;
            head.castShadow = true;
            penguinGroup.add(head);

            const beakGeo = new THREE.ConeGeometry(0.25, 0.6, 16);
            const beak = new THREE.Mesh(beakGeo, beakMat);
            beak.rotation.x = Math.PI / 2;
            beak.position.set(0, 2.4, 0.8);
            beak.castShadow = true;
            penguinGroup.add(beak);

            const flipperGeo = new THREE.BoxGeometry(0.2, 1, 0.4);
            const leftFlipper = new THREE.Mesh(flipperGeo, bodyMat);
            leftFlipper.position.set(-1.0, 1.4, 0);
            leftFlipper.rotation.z = Math.PI / 6;
            leftFlipper.castShadow = true;
            penguinGroup.add(leftFlipper);

            const rightFlipper = new THREE.Mesh(flipperGeo, bodyMat);
            rightFlipper.position.set(1.0, 1.4, 0);
            rightFlipper.rotation.z = -Math.PI / 6;
            rightFlipper.castShadow = true;
            penguinGroup.add(rightFlipper);

            const footGeo = new THREE.BoxGeometry(0.4, 0.15, 0.7);
            const leftFoot = new THREE.Mesh(footGeo, beakMat);
            leftFoot.position.set(-0.4, 0.1, 0.3);
            leftFoot.castShadow = true;
            penguinGroup.add(leftFoot);

            const rightFoot = new THREE.Mesh(footGeo, beakMat);
            rightFoot.position.set(0.4, 0.1, 0.3);
            rightFoot.castShadow = true;
            penguinGroup.add(rightFoot);

            scene.add(penguinGroup);
            return penguinGroup;
        }

        const myPenguin = createPenguin();

        socket.on('currentPlayers', (players) => {
            Object.keys(players).forEach((id) => {
                if (id === socket.id) return; 
                const p = createPenguin();
                p.position.set(players[id].x, 0, players[id].z);
                otherPlayers[id] = p;
            });
        });

        socket.on('newPlayer', (data) => {
            const p = createPenguin();
            p.position.set(data.playerInfo.x, 0, data.playerInfo.z);
            otherPlayers[data.id] = p;
        });

        socket.on('playerMoved', (data) => {
            if (otherPlayers[data.id]) {
                otherPlayers[data.id].position.set(data.x, 0, data.z);
                otherPlayers[data.id].rotation.y = data.yRot;
                const time = Date.now() * 0.015;
                otherPlayers[data.id].rotation.z = Math.sin(time) * 0.15;
            }
        });

        socket.on('playerDisconnected', (id) => {
            if (otherPlayers[id]) {
                scene.remove(otherPlayers[id]);
                delete otherPlayers[id];
            }
        });

        const raycaster = new THREE.Raycaster();
        const mouse = new THREE.Vector2();
        let targetPosition = new THREE.Vector3(0, 0, 0);
        let isMoving = false;

        window.addEventListener('pointerdown', (event) => {
            if (event.target.closest('#ui-container')) return;

            mouse.x = (event.clientX / window.innerWidth) * 2 - 1;
            mouse.y = -(event.clientY / window.innerHeight) * 2 + 1;

            raycaster.setFromCamera(mouse, camera);
            const intersects = raycaster.intersectObject(ground);

            if (intersects.length > 0) {
                targetPosition.copy(intersects[0].point);
                targetPosition.y = 0; 
                isMoving = true;
            }
        });

        const chatLog = document.getElementById('chat-log');
        const usernameInput = document.getElementById('username-input');
        const messageInput = document.getElementById('message-input');
        const sendBtn = document.getElementById('send-btn');

        function sendServerMessage() {
            const user = usernameInput.value.trim() || 'Penguin';
            const msg = messageInput.value.trim();
            if (!msg) return;

            socket.emit('chatMessage', { username: user, msg: msg });
            messageInput.value = '';
        }

        sendBtn.addEventListener('click', sendServerMessage);
        messageInput.addEventListener('keypress', (e) => {
            if (e.key === 'Enter') sendServerMessage();
        });

        socket.on('newChatMessage', (data) => {
            const msgDiv = document.createElement('div');
            msgDiv.style.marginBottom = "4px";
            msgDiv.innerHTML = `<strong>${data.username}:</strong> ${data.msg}`;
            chatLog.appendChild(msgDiv);
            chatLog.scrollTop = chatLog.scrollHeight; 

            spawnSpeechBubble(data.id, data.msg);
        });

        function spawnSpeechBubble(id, text) {
            if (speechBubbles[id]) {
                speechBubbles[id].element.remove();
                clearTimeout(speechBubbles[id].timer);
            }

            const bubble = document.createElement('div');
            bubble.className = 'speech-bubble';
            bubble.innerText = text;
            bubblesContainer.appendChild(bubble);

            speechBubbles[id] = {
                element: bubble,
                timer: setTimeout(() => {
                    bubble.remove();
                    delete speechBubbles[id];
                }, 4000)
            };
        }

        const clock = new THREE.Clock();
        const speed = 7.0; 

        function animate() {
            requestAnimationFrame(animate);
            const delta = clock.getDelta();

            if (isMoving) {
                const distance = myPenguin.position.distanceTo(targetPosition);
                if (distance > 0.1) {
                    const targetAngle = Math.atan2(
                        targetPosition.x - myPenguin.position.x, 
                        targetPosition.z - myPenguin.position.z
                    );
                    myPenguin.rotation.y = targetAngle;

                    const direction = new THREE.Vector3().subVectors(targetPosition, myPenguin.position).normalize();
                    myPenguin.position.add(direction.multiplyScalar(speed * delta));

                    const time = Date.now() * 0.015;
                    myPenguin.rotation.z = Math.sin(time) * 0.15;

                    socket.emit('playerMovement', {
                        x: myPenguin.position.x,
                        z: myPenguin.position.z,
                        yRot: myPenguin.rotation.y
                    });

                } else {
                    isMoving = false;
                    myPenguin.rotation.z = 0; 
                }
            } else {
                socket.emit('playerMovement', { x: myPenguin.position.x, z: myPenguin.position.z, yRot: myPenguin.rotation.y });
            }

            Object.keys(speechBubbles).forEach(id => {
                let targetPenguin = (id === socket.id) ? myPenguin : otherPlayers[id];
                
                if (targetPenguin) {
                    const headPos = targetPenguin.position.clone();
                    headPos.y += 3.5; 
                    headPos.project(camera);

                    const x = (headPos.x * .5 + .5) * window.innerWidth;
                    const y = (headPos.y * -.5 + .5) * window.innerHeight;

                    speechBubbles[id].element.style.left = `${x}px`;
                    speechBubbles[id].element.style.top = `${y}px`;
                }
            });

            renderer.render(scene, camera);
        }

        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });

        animate();
    </script>
</body>
</html>
